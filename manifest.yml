modules:
  rovo:agent:
    - key: snowtools-hello-world-agent
      name: SNOWTools
      description: A Rovo agent that creates ServiceNow Change Requests from Jira releases
      prompt: prompts/agent-instructions.md
      conversationStarters:
        - Create a ServiceNow change request from a Jira release
      actions:
        - get-jira-release
        - create-snow-change-request
        - convert-snow-csv-to-jira
  action:
    - key: get-jira-release
      name: Get Jira Release
      function: getJiraRelease
      actionVerb: GET
      description: Fetches a Jira release by project key and release name. Returns name, description, dates, and issues. Call this as soon as the user provides the project key and release name.
      inputs:
        project_key:
          title: Project Key
          type: string
          required: false
          description: |
            The Jira project key (e.g. "SDF"). Provided by the user.
        release_name:
          title: Release Name
          type: string
          required: false
          description: |
            The name of the Jira release/version (e.g. "Camuf1Toti"). Provided by the user.
    - key: create-snow-change-request
      name: Create ServiceNow Change Request
      function: createSnowChangeRequest
      actionVerb: CREATE
      description: |
        Creates a Change Request in ServiceNow using data gathered from a Jira release.
        Call this action once all required inputs have been collected from the user and
        from the Jira teamwork graph (release name, description, dates, issues list).
      inputs:
        release_name:
          title: Release Name
          type: string
          required: false
          description: |
            The Jira release/version name (e.g. "v1.2.3"). Look this up from the Jira release.
        project_name:
          title: Project Name
          type: string
          required: false
          description: |
            The Jira project name or key (e.g. "SDF"). Look this up from the Jira release.
        description:
          title: Description
          type: string
          required: false
          description: |
            The full description for the change request. Combine the Jira release description
            (if any) and the newline-separated list of issues in the format "KEY: Summary".
            Constructed from the Jira release data — do not ask the user.
        type:
          title: Change Type
          type: string
          required: false
          description: |
            The type of change. Must be one of: normal, standard, emergency.
            Ask the user for this value.
        risk:
          title: Risk
          type: string
          required: false
          description: |
            The risk level of the change. Ask the user to choose from:
            low, moderate, high, very_high.
            The handler will map this to the correct ServiceNow numeric value.
        impact:
          title: Impact
          type: string
          required: false
          description: |
            The impact level of the change. Ask the user to choose from:
            high, medium, low.
            The handler will map this to the correct ServiceNow numeric value.
        assignment_group:
          title: Assignment Group
          type: string
          required: false
          description: |
            The name of the ServiceNow assignment group responsible for implementing the change.
            Ask the user for this value.
        start_date:
          title: Start Date
          type: string
          required: false
          description: |
            The planned start date and time for the change, in format: YYYY-MM-DD HH:MM:SS.
            Use the Jira release start date if available. Only ask the user if missing from Jira.
        end_date:
          title: End Date
          type: string
          required: false
          description: |
            The planned end date and time for the change, in format: YYYY-MM-DD HH:MM:SS.
            Use the Jira release date (releaseDate) if available. Only ask the user if missing from Jira.
        additional_sections:
          title: Additional Sections
          type: string
          required: false
          description: |
            A structured text block containing three sections generated by the agent:
            IMPLEMENTATION_PLAN: <text>
            RISK_AND_IMPACT: <text>
            TEST_PLAN: <text>
            Each section is separated by a newline and the next section label.
            Generate this from the release issues and architecture reference page.
            Do not ask the user for this.
    - key: convert-snow-csv-to-jira
      name: Convert SNOW CSV to Jira Import
      function: convertSnowCsvToJira
      actionVerb: GET
      description: Converts a SNOW CSV export (attached to a Confluence page) into a Jira-ready import CSV and uploads the result back to the same page.
      inputs:
        page_url:
          title: Confluence Page URL
          type: string
          required: false
          description: |
            The full URL of the Confluence page where the SNOW CSV export file is attached,
            or a bare numeric Confluence page ID.
            Example: "https://site.atlassian.net/wiki/spaces/KEY/pages/123456789/Page+Title"
            Ask the user to provide this value.
        attachment_filename:
          title: Attachment Filename Hint
          type: string
          required: false
          description: |
            Optional partial filename to identify the correct CSV attachment if the page
            has multiple attachments. For example "snow" or "export". Leave blank to
            automatically pick the first .csv file found on the page.
  function:
    - key: getJiraRelease
      handler: index.getJiraRelease
    - key: createSnowChangeRequest
      handler: index.createSnowChangeRequest
    - key: convertSnowCsvToJira
      handler: index.convertSnowCsvToJira
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/8b2c8e05-c269-42a0-a25a-f2ff5eb67d33
resources:
  - key: agent-prompts
    path: prompts
permissions:
  external:
    fetch:
      backend:
        - address: "*.service-now.com"
  scopes:
    - read:jira-work
    - read:chat:rovo
    - read:confluence-content.all
    - write:confluence-content
